<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automower Rjukan</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☘️</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1a0f; color: #d4e8d4;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: #0f1a0f;
    border-bottom: 1px solid #1e3a1e; flex-shrink: 0; gap: 12px; z-index: 10;
    flex-wrap: wrap;
  }
  .title-block { display: flex; align-items: baseline; gap: 10px; }
  h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #7ec87e; }
  .subtitle { font-size: 11px; color: #4a7a4a; }
  .status-bar { display: flex; align-items: center; gap: 16px; font-size: 11px; flex-wrap: wrap; }
  .status-item { display: flex; align-items: center; gap: 5px; color: #4a7a4a; }
  .status-item span { color: #a0d0a0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2a5a2a; }
  .status-dot.active { background: #5cdb5c; box-shadow: 0 0 6px #5cdb5c88; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .divider { width: 1px; background: #2a4a2a; height: 18px; margin: 0 2px; }
  button {
    padding: 5px 11px; border-radius: 4px; border: 1px solid #2a4a2a;
    background: #162416; color: #7ec87e; font-size: 11px; cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.15s;
  }
  button:hover { background: #1e3a1e; border-color: #4a8a4a; }
  button.active { background: #1e4a1e; border-color: #7ec87e; color: #b0e8b0; }
  button.export { border-color: #4a6a2a; color: #a0c87e; }
  #map { flex: 1; background: #0a140a; }

  /* Mobile */
  .mobile-status {
    display: none; position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(15,26,15,0.92); border-top: 1px solid #1e3a1e;
    padding: 8px 16px; font-size: 11px; color: #4a7a4a;
    align-items: center; justify-content: space-between;
  }
  .mobile-status span { color: #a0d0a0; }
  .fab {
    display: none; position: absolute; bottom: 48px; right: 16px; z-index: 1001;
    width: 48px; height: 48px; border-radius: 50%;
    background: #1e4a1e; border: 1px solid #7ec87e;
    color: #7ec87e; font-size: 22px; cursor: pointer;
    align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .slide-menu {
    display: none; position: absolute; bottom: 0; left: 0; right: 0; z-index: 1002;
    background: #0f1a0f; border-top: 1px solid #1e3a1e;
    border-radius: 16px 16px 0 0; padding: 16px;
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .slide-menu.open { transform: translateY(0); }
  .menu-handle { width: 36px; height: 4px; background: #2a4a2a; border-radius: 2px; margin: 0 auto 16px; }
  .menu-section { margin-bottom: 14px; }
  .menu-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #4a7a4a; margin-bottom: 8px; }
  .menu-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .menu-btn {
    flex: 1; padding: 10px 8px; border-radius: 6px; border: 1px solid #2a4a2a;
    background: #162416; color: #7ec87e; font-size: 13px; cursor: pointer;
    text-align: center; transition: all 0.15s; min-width: 80px;
  }
  .menu-btn.active { background: #1e4a1e; border-color: #7ec87e; color: #b0e8b0; }
  .menu-btn.export-btn { border-color: #4a6a2a; color: #a0c87e; }
  .overlay { display: none; position: absolute; inset: 0; z-index: 1001; background: rgba(0,0,0,0.4); }
  .overlay.show { display: block; }

  @media (max-width: 768px) {
    header { display: none !important; }
    .mobile-status { display: flex !important; }
    .fab { display: flex !important; }
    .slide-menu { display: block !important; }
  }

  /* Leaflet overrides */
  .leaflet-control-attribution { background: rgba(15,26,15,0.8) !important; color: #3a5a3a !important; font-size: 10px !important; }
  .leaflet-control-attribution a { color: #4a7a4a !important; }
  .leaflet-control-zoom a { background: #162416 !important; color: #7ec87e !important; border-color: #2a4a2a !important; }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>Automower Rjukan</h1>
    <div class="subtitle">Position History</div>
  </div>
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Loading…</span>
    </div>
    <div class="status-item">Sessions: <span id="sessionCount">—</span></div>
    <div class="status-item">Points: <span id="pointCount">—</span></div>
    <div class="status-item">Updated: <span id="lastUpdate">—</span></div>
  </div>
  <div class="controls">
    <button id="btnTrack" onclick="showTrack()">Latest Track</button>
    <button id="btnHeat" onclick="showHeatmap()">Coverage Map</button>
    <button id="btnAll" class="active" onclick="showAll()">All Tracks</button>
    <button onclick="refreshData()">↻ Refresh</button>
    <div class="divider"></div>
    <button id="btnOSM" class="active" onclick="setMapType('osm')">Map</button>
    <button id="btnSat" onclick="setMapType('satellite')">Satellite</button>
    <div class="divider"></div>
    <button class="export" onclick="exportTracksSVG()">↓ Tracks SVG</button>
    <button class="export" onclick="exportHeatmapSVG()">↓ Heatmap SVG</button>
  </div>
</header>

<div id="map" style="position:relative">
  <div class="mobile-status" id="mobileStatus">
    <div>☘️ Automower Rjukan</div>
    <div>Sessions: <span id="mSessionCount">—</span> · <span id="mStatusText">Loading…</span></div>
  </div>
  <button class="fab" id="fabBtn" onclick="toggleMenu()">☰</button>
  <div class="overlay" id="overlay" onclick="closeMenu()"></div>
  <div class="slide-menu" id="slideMenu">
    <div class="menu-handle"></div>
    <div class="menu-section">
      <div class="menu-label">View</div>
      <div class="menu-row">
        <button class="menu-btn" id="mBtnTrack" onclick="showTrack();closeMenu()">Latest Track</button>
        <button class="menu-btn" id="mBtnHeat" onclick="showHeatmap();closeMenu()">Coverage Map</button>
        <button class="menu-btn active" id="mBtnAll" onclick="showAll();closeMenu()">All Tracks</button>
      </div>
    </div>
    <div class="menu-section">
      <div class="menu-label">Map Style</div>
      <div class="menu-row">
        <button class="menu-btn active" id="mBtnOSM" onclick="setMapType('osm')">Map</button>
        <button class="menu-btn" id="mBtnSat" onclick="setMapType('satellite')">Satellite</button>
      </div>
    </div>
    <div class="menu-section">
      <div class="menu-label">Actions</div>
      <div class="menu-row">
        <button class="menu-btn" onclick="refreshData();closeMenu()">↻ Refresh</button>
        <button class="menu-btn export-btn" onclick="exportTracksSVG();closeMenu()">↓ Tracks SVG</button>
        <button class="menu-btn export-btn" onclick="exportHeatmapSVG();closeMenu()">↓ Heatmap SVG</button>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/jcdrjukan/automower-data/main/mower_positions.json";
const GARDEN_LAT = 59.8792;
const GARDEN_LON = 8.5793;
const TRACK_COLORS = ["#5cdb5c","#4ab84a","#3a963a","#2a742a","#1a521a"];

let map, allData = [], currentMode = "all";
let layers = [];
let osmLayer, satLayer;

function initMap() {
  map = L.map("map", { center: [GARDEN_LAT, GARDEN_LON], zoom: 19, maxZoom: 22, zoomControl: true });

  osmLayer = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap", maxZoom: 19, maxNativeZoom: 19, crossOrigin: true
  });

  satLayer = L.tileLayer("https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}", {
    attribution: "© Google", maxZoom: 22, maxNativeZoom: 21, crossOrigin: true
  });

  osmLayer.addTo(map);
}

function clearLayers() {
  layers.forEach(l => map.removeLayer(l));
  layers = [];
}

function showTrack() {
  clearLayers();
  currentMode = "track";
  setActiveBtn("btnTrack", "mBtnTrack");
  if (allData.length === 0) return;
  const latest = allData[allData.length - 1];
  const coords = latest.positions.map(p => [p.latitude, p.longitude]);
  const line = L.polyline(coords, { color: "#5cdb5c", weight: 2.5, opacity: 0.9 }).addTo(map);
  layers.push(line);
  if (coords.length > 0) {
    layers.push(L.circleMarker(coords[0], { radius: 5, color: "#7ec87e", fillColor: "#7ec87e", fillOpacity: 1 }).bindTooltip("Start").addTo(map));
    layers.push(L.circleMarker(coords[coords.length-1], { radius: 5, color: "#ff9944", fillColor: "#ff9944", fillOpacity: 1 }).bindTooltip("Latest").addTo(map));
    map.fitBounds(line.getBounds(), { padding: [40,40] });
  }
}

function showHeatmap() {
  clearLayers();
  currentMode = "heat";
  setActiveBtn("btnHeat", "mBtnHeat");
  if (allData.length === 0) return;
  const points = allData.flatMap(s => s.positions.map(p => [p.latitude, p.longitude, 1]));
  const heat = L.heatLayer(points, { radius: 12, blur: 8, maxZoom: 21,
    gradient: { 0.2:"#1a3a1a", 0.4:"#2d6b2d", 0.6:"#4aaa4a", 0.8:"#7ecf7e", 1.0:"#ffffff" }
  }).addTo(map);
  layers.push(heat);
}

function showAll() {
  clearLayers();
  currentMode = "all";
  setActiveBtn("btnAll", "mBtnAll");
  if (allData.length === 0) return;
  const bounds = [];
  allData.forEach((session, i) => {
    const coords = session.positions.map(p => [p.latitude, p.longitude]);
    const line = L.polyline(coords, { color: TRACK_COLORS[i % TRACK_COLORS.length], weight: 1.5, opacity: 0.7 }).addTo(map);
    layers.push(line);
    bounds.push(...coords);
  });
  if (bounds.length > 0) map.fitBounds(L.latLngBounds(bounds), { padding: [40,40] });
}

function setMapType(type) {
  if (type === "osm") {
    map.removeLayer(satLayer); osmLayer.addTo(map);
    ["btnOSM","mBtnOSM"].forEach(b => { const el=document.getElementById(b); if(el) el.classList.add("active"); });
    ["btnSat","mBtnSat"].forEach(b => { const el=document.getElementById(b); if(el) el.classList.remove("active"); });
  } else {
    map.removeLayer(osmLayer); satLayer.addTo(map);
    ["btnSat","mBtnSat"].forEach(b => { const el=document.getElementById(b); if(el) el.classList.add("active"); });
    ["btnOSM","mBtnOSM"].forEach(b => { const el=document.getElementById(b); if(el) el.classList.remove("active"); });
  }
}

function setActiveBtn(deskId, mobId) {
  ["btnTrack","btnHeat","btnAll"].forEach(b => { const el=document.getElementById(b); if(el) el.classList.toggle("active", b===deskId); });
  ["mBtnTrack","mBtnHeat","mBtnAll"].forEach(b => { const el=document.getElementById(b); if(el) el.classList.toggle("active", b===mobId); });
}

function toggleMenu() {
  document.getElementById("slideMenu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}
function closeMenu() {
  document.getElementById("slideMenu").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

// SVG Export
function getBounds() {
  const pts = allData.flatMap(s => s.positions);
  if (!pts.length) return null;
  return { minLat: Math.min(...pts.map(p=>p.latitude)), maxLat: Math.max(...pts.map(p=>p.latitude)),
           minLon: Math.min(...pts.map(p=>p.longitude)), maxLon: Math.max(...pts.map(p=>p.longitude)) };
}
function toXY(lat, lon, b, W, H, pad) {
  return { x: (pad + (lon-b.minLon)/(b.maxLon-b.minLon)*W).toFixed(2),
           y: (pad + (1-(lat-b.minLat)/(b.maxLat-b.minLat))*H).toFixed(2) };
}
function exportTracksSVG() {
  const b = getBounds(); if (!b) { alert("No data yet!"); return; }
  const PAD=40, W=800, H=800;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W+PAD*2} ${H+PAD*2}">\n<rect width="100%" height="100%" fill="none"/>\n`;
  allData.forEach((s,i) => {
    const pts = s.positions.map(p => { const c=toXY(p.latitude,p.longitude,b,W,H,PAD); return `${c.x},${c.y}`; }).join(" ");
    svg += `<polyline points="${pts}" fill="none" stroke="${TRACK_COLORS[i%TRACK_COLORS.length]}" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>\n`;
  });
  downloadSVG(svg+"</svg>", "automower_tracks.svg");
}
function exportHeatmapSVG() {
  const b = getBounds(); if (!b) { alert("No data yet!"); return; }
  const PAD=40, W=800, H=800, CELL=8;
  const grid = {};
  allData.forEach(s => s.positions.forEach(p => {
    const c=toXY(p.latitude,p.longitude,b,W,H,PAD);
    const key=`${Math.floor(parseFloat(c.x)/CELL)},${Math.floor(parseFloat(c.y)/CELL)}`;
    grid[key]=(grid[key]||0)+1;
  }));
  const maxV = Math.max(...Object.values(grid));
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W+PAD*2} ${H+PAD*2}">\n<rect width="100%" height="100%" fill="none"/>\n`;
  Object.entries(grid).forEach(([key,count]) => {
    const [gx,gy]=key.split(",").map(Number);
    const t=count/maxV;
    const fill = t<0.33?`rgba(45,107,45,${(t/0.33).toFixed(2)})`:t<0.66?`rgba(74,170,74,${((t-0.33)/0.33).toFixed(2)})`:
                 `rgba(200,240,200,${((t-0.66)/0.34).toFixed(2)})`;
    svg += `<circle cx="${gx*CELL+CELL/2}" cy="${gy*CELL+CELL/2}" r="${Math.round(CELL*0.7)}" fill="${fill}"/>\n`;
  });
  downloadSVG(svg+"</svg>", "automower_heatmap.svg");
}
function downloadSVG(content, filename) {
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([content],{type:"image/svg+xml"}));
  a.download=filename; a.click();
}

function updateStats(data) {
  const total = data.reduce((s,d)=>s+d.positions.length,0);
  document.getElementById("sessionCount").textContent = data.length;
  document.getElementById("pointCount").textContent = total.toLocaleString();
  document.getElementById("mSessionCount").textContent = data.length;
  if (data.length > 0) {
    const last = new Date(data[data.length-1].timestamp);
    const fmt = last.toLocaleString("no-NO",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    document.getElementById("lastUpdate").textContent = fmt;
    document.getElementById("mStatusText").textContent = "Updated " + last.toLocaleString("no-NO",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("statusDot").classList.add("active");
    document.getElementById("statusText").textContent = "Data loaded";
  } else {
    document.getElementById("statusText").textContent = "No sessions yet";
    document.getElementById("mStatusText").textContent = "No sessions yet";
  }
}

async function refreshData() {
  document.getElementById("statusText").textContent = "Loading…";
  document.getElementById("mStatusText").textContent = "Loading…";
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (res.ok) {
      allData = await res.json();
    } else {
      document.getElementById("statusText").textContent = "HTTP " + res.status;
      document.getElementById("mStatusText").textContent = "HTTP " + res.status;
    }
  } catch(e) {
    document.getElementById("statusText").textContent = "Error: " + e.message;
    document.getElementById("mStatusText").textContent = "Error: " + e.message;
  }
  updateStats(allData);
  showAll();
}

initMap();
refreshData();
</script>
</body>
</html>
